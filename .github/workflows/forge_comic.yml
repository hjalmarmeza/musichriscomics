name: 🎨 MusiChris Comic Forge

on:
  repository_dispatch:
    types: [forge_comic]

jobs:
  forge:
    runs-on: ubuntu-latest
    env:
      VIDEO_TITLE: "🎨 MusiChris Comic: ${{ github.event.client_payload.title }}"
      VIDEO_DESCRIPTION: "📖 Historia: ${{ github.event.client_payload.description }}\n\nForjado automáticamente por la IA de MusiChris Studio 🚀"
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🧠 AI Story Expansion (Master Forge)
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const title = `${{ github.event.client_payload.title }}`;
          const idea = `${{ github.event.client_payload.description }}`;

          const payload = {
            model: 'llama3.1-70b',
            messages: [
              {
                role: 'system', 
                content: 'Eres el Guionista Maestro de MusiChris Comic. Tu tarea es expandir una idea simple en un guion de cómic de 6 paneles, un nuevo título creativo y una enseñanza final profunda. REGLAS: Responde ÚNICAMENTE con un JSON válido. El JSON debe tener: "creative_title" (Un título corto y de alto impacto para el video, NO uses el nombre de la canción), "story" (lista de 6 objetos con "prompt" detallado en INGLÉS y "text" narrativo en ESPAÑOL de máx 12 palabras), "lesson" (un mensaje CLÍMAX ministerial, inspiracional y de alto impacto que deje una huella profunda en el espectador, resumiendo la victoria o promesa espiritual de la historia en máx 20 palabras) y "reference" (la cita bíblica correspondiente Libro Capítulo:Versículo). Estilo: Épico, Ministerial, Cinematic.'
              },
              {
                role: 'user', 
                content: `Título Base/Canción: ${title}. ADN Bíblico: ${idea}. Genera el título creativo, la historia y la enseñanza de impacto.`
              }
            ]
          };

          const options = {
            hostname: 'api.cerebras.ai',
            path: '/v1/chat/completions',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + process.env.CEREBRAS_API_KEY
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              if (res.statusCode === 200) {
                const response = JSON.parse(data);
                let content = response.choices[0].message.content;
                content = content.replace(/```json|```/g, '').trim();
                fs.writeFileSync('story_expanded.json', content);
                console.log('✅ Historia y enseñanza de impacto generadas con éxito.');
              } else {
                console.error('❌ Error Cerebras:', data);
                process.exit(1);
              }
            });
          });
          req.on('error', (e) => { console.error(e); process.exit(1); });
          req.write(JSON.stringify(payload));
          req.end();
          EOF

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Python Dependencies
        run: pip install huggingface_hub Pillow requests python-dotenv

      - name: 🎥 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🎨 Forging Panels & Video
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import json
          from scripts.comic_engine import MusiChrisComicEngine
          
          with open('story_expanded.json', 'r') as f:
              story_data = json.load(f)
          
          # Use generated title if available, fallback to payload
          title = story_data.get('creative_title', os.getenv('VIDEO_TITLE', 'MusiChris Story').replace('🎨 MusiChris Comic: ', ''))
          song_url = "${{ github.event.client_payload.song_url }}"
          
          engine = MusiChrisComicEngine()
          
          # If song_url is provided (Song to Story mode), use it. Else pick random.
          if song_url and song_url != "":
              bg_audio = song_url
              print(f"🎵 Using Catalog Song: {song_url}")
          else:
              bg_song = engine.get_random_bg_music()
              bg_audio = bg_song['audio_url']
          
          p_paths = engine.forge_panels(story_data['story'])
          if p_paths:
              engine.render_motion_comic(p_paths, title, bg_audio, "final_comic.mp4", story_data)
          EOF

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Node Dependencies
        run: npm install googleapis

      - name: ☁️ Upload to YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          node scripts/upload_engine.js renders/final_comic.mp4
